<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wallet Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;--surface:#fff;--border:#e8e4dc;--border2:#d0ccc0;
  --text:#1a1814;--muted:#9b9488;--faint:#c8c4bb;
  --green:#1a7a4a;--green-bg:#edf7f2;--green-border:#bbf7d0;
  --red:#c0392b;--red-bg:#fdf0ee;
  --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes expand{from{opacity:0;transform:scaleY(.95)}to{opacity:1;transform:scaleY(1)}}

/* ── HEADER ── */
header{
  border-bottom:1px solid var(--border);padding:18px 36px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  background:rgba(247,246,242,.96);backdrop-filter:blur(16px);
}
h1{font-size:13px;font-weight:800;letter-spacing:3px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.btn-sm{font-size:10px;font-family:var(--mono);cursor:pointer;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
.btn-sm:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.85;color:#fff}

/* ── LAYOUT ── */
main{max-width:1400px;margin:0 auto;padding:28px 36px 60px;display:grid;grid-template-columns:1fr 420px;gap:20px;align-items:start}

/* ── STATS ROW ── */
.stats{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.stat-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:20px;font-weight:800;font-family:var(--mono);line-height:1}
.stat-sub{font-size:10px;color:var(--faint);margin-top:4px;font-family:var(--mono)}

/* ── TRADERS PANEL ── */
.traders-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.panel-actions{display:flex;gap:6px}

/* ── TRADER ROW ── */
.trader-row{border-bottom:1px solid var(--border);animation:fadeUp .3s ease}
.trader-row:last-child{border-bottom:none}
.trader-header{
  display:grid;grid-template-columns:32px 1fr auto auto;
  align-items:center;gap:12px;
  padding:14px 20px;cursor:pointer;
  transition:background .15s;user-select:none;
}
.trader-header:hover{background:var(--bg)}
.trader-rank{font-family:var(--mono);font-size:10px;color:var(--faint);text-align:center}
.trader-info{}
.trader-name{font-weight:700;font-size:14px;margin-bottom:2px}
.trader-addr{font-family:var(--mono);font-size:10px;color:var(--muted)}
.trader-eth{text-align:right}
.trader-eth-val{font-family:var(--mono);font-size:14px;font-weight:700}
.trader-eth-usd{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.trader-chevron{font-size:10px;color:var(--faint);transition:transform .25s;flex-shrink:0}
.trader-row.open .trader-chevron{transform:rotate(180deg)}

/* ── ACCORDION ── */
.trader-body{
  display:none;border-top:1px solid var(--border);
  background:var(--bg);
  animation:expand .2s ease;transform-origin:top;
}
.trader-row.open .trader-body{display:block}
.trader-body-inner{padding:0}

.token-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:24px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}

.token-table{width:100%;border-collapse:collapse}
.token-table th{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border-bottom:1px solid var(--border);text-align:left;font-weight:500}
.token-table th:last-child,.token-table td:last-child{text-align:right}
.token-table th:nth-child(3),.token-table td:nth-child(3){text-align:right}
.token-table td{padding:10px 20px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.token-table tr:last-child td{border-bottom:none}
.token-table tr:hover td{background:rgba(0,0,0,.02)}
.tok-icon{width:26px;height:26px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--mono);font-weight:700;color:var(--muted);vertical-align:middle;margin-right:8px}
.tok-name{font-weight:600;font-size:12px}
.tok-symbol{font-family:var(--mono);font-size:10px;color:var(--muted)}
.tok-amount{font-family:var(--mono);font-size:12px;font-weight:500}
.tok-usd{font-family:var(--mono);font-size:12px;font-weight:700}
.tok-usd.positive{color:var(--green)}
.no-tokens{padding:20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--faint)}

/* ── ADD WALLET ── */
.add-form{display:none;padding:16px 20px;border-top:1px solid var(--border);background:var(--bg);flex-direction:column;gap:8px}
.add-form.open{display:flex}
.add-form input{font-family:var(--mono);font-size:11px;border:1px solid var(--border);border-radius:6px;padding:8px 12px;background:var(--surface);outline:none;transition:border-color .2s}
.add-form input:focus{border-color:var(--border2)}
.add-form-btns{display:flex;gap:6px}
.btn-confirm{flex:1;font-family:var(--mono);font-size:11px;background:var(--text);color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;transition:opacity .2s}
.btn-confirm:hover{opacity:.8}
.btn-cancel{font-family:var(--mono);font-size:11px;background:none;color:var(--muted);border:1px solid var(--border);padding:8px 14px;border-radius:6px;cursor:pointer}

/* ── FEED PANEL ── */
.feed-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:76px}
.feed-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--bg);font-family:var(--mono);font-size:10px;color:var(--muted)}
.sync-track{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.sync-fill{height:100%;background:var(--green);border-radius:1px;transition:width 1s linear}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
.sync-dot.idle{background:var(--faint);animation:none}

.feed-list{max-height:calc(100vh - 280px);overflow-y:auto}
.feed-row{display:flex;flex-direction:column;gap:3px;padding:10px 20px;border-bottom:1px solid var(--border);animation:fadeUp .3s ease}
.feed-row:last-child{border-bottom:none}
.feed-row:hover{background:var(--bg)}
.feed-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.feed-wallet{font-weight:600;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-amount{font-family:var(--mono);font-size:12px;font-weight:700}
.feed-bottom{display:flex;align-items:center;justify-content:space-between}
.feed-dir{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.feed-dir.buy{background:var(--green-bg);color:var(--green)}
.feed-dir.sell{background:var(--red-bg);color:var(--red)}
.feed-time{font-family:var(--mono);font-size:10px;color:var(--faint)}
.feed-empty{padding:32px 20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--faint)}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--text);color:#fff;padding:12px 16px;border-radius:10px;font-family:var(--mono);font-size:11px;max-width:280px;animation:fadeUp .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.toast strong{display:block;margin-bottom:2px}
.toast span{color:rgba(255,255,255,.65);font-size:10px}

@media(max-width:1024px){
  main{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .feed-panel{position:static}
  .feed-list{max-height:300px}
}
</style>
</head>
<body>

<header>
  <h1>Wallet Radar</h1>
  <div class="header-right">
    <div class="live-pill"><div class="dot"></div>LIVE</div>
    <button class="btn-sm" id="alertBtn" onclick="toggleAlerts()">🔔 Alerts</button>
    <button class="btn-sm btn-primary" onclick="toggleAddForm()">+ Add Wallet</button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Traders</div>
      <div class="stat-value" id="statWallets">0</div>
      <div class="stat-sub">Ethereum Mainnet</div>
    </div>
    <div class="stat">
      <div class="stat-label">Transactions</div>
      <div class="stat-value" id="statTx">0</div>
      <div class="stat-sub">since page load</div>
    </div>
    <div class="stat">
      <div class="stat-label">Volume</div>
      <div class="stat-value" id="statVol">0</div>
      <div class="stat-sub">ETH tracked</div>
    </div>
    <div class="stat">
      <div class="stat-label">Latest Block</div>
      <div class="stat-value" id="statBlock">—</div>
      <div class="stat-sub" id="statBlockTime">—</div>
    </div>
  </div>

  <!-- Traders List -->
  <div>
    <div class="traders-panel">
      <div class="panel-header">
        <span class="panel-title">Top Traders</span>
        <div class="panel-actions">
          <button class="btn-sm" onclick="loadFamous()" style="color:var(--green);border-color:var(--green-border)">⭐ Famous</button>
        </div>
      </div>
      <div id="traderList"><div class="token-loading"><div class="spinner"></div>Loading…</div></div>
      <div class="add-form" id="addForm">
        <div style="display:flex;gap:6px">
          <input id="inputAddr" placeholder="0x… address or ENS name (e.g. vitalik.eth)" style="flex:1"/>
          <button class="btn-sm" onclick="resolveENS()" style="flex-shrink:0;padding:6px 10px">Lookup</button>
        </div>
        <input id="inputName" placeholder="Label (e.g. Arthur Hayes)"/>
        <div id="ensStatus" style="font-family:var(--mono);font-size:10px;color:var(--muted);display:none"></div>
        <div class="add-form-btns">
          <button class="btn-confirm" onclick="addWallet()">Save</button>
          <button class="btn-cancel" onclick="toggleAddForm()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Live Feed -->
  <div>
    <div class="feed-panel">
      <div class="feed-header">
        <span class="panel-title">Live Feed</span>
        <button class="btn-sm" onclick="syncNow()">↻ Refresh</button>
      </div>
      <div class="sync-bar">
        <div class="sync-dot idle" id="syncDot"></div>
        <span id="syncLabel">Ready</span>
        <div class="sync-track"><div class="sync-fill" id="syncFill" style="width:100%"></div></div>
        <button class="btn-sm" id="pauseBtn" onclick="togglePause()" style="padding:2px 8px">⏸</button>
      </div>
      <div class="feed-list" id="liveFeed">
        <div class="feed-empty">Waiting for transactions…</div>
      </div>
    </div>
  </div>
</main>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────
const ETH_PRICE_USD = 1800 // fallback; fetched on load
const FAMOUS = [
  // ── Verified via ENS / public sources ──────────────────────────────────
  // Vitalik Buterin — vitalik.eth (publicly confirmed by him)
  {address:'0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045', label:'Vitalik Buterin', tag:'ETH Co-Founder'},
  // Brian Armstrong — barmstrong.eth (ENS registered, publicly shared)
  {address:'0x5b76f5b8fc9d700624f78208132f91ad4e61a1f0', label:'Brian Armstrong', tag:'Coinbase CEO'},
  // CZ — cz binance.eth (ENS registered, Etherscan labelled)
  {address:'0x81b2587f04ddf814094ab88efdd4f29ee3407437', label:'CZ (Binance)', tag:'Binance Founder'},
  // Mark Cuban — publicly shared on Twitter
  {address:'0x293Ed38530005620e4B28600f196a97E1125dAAc', label:'Mark Cuban', tag:'Investor / Shark Tank'},
  // Justin Sun — justinsun.eth (Etherscan labelled)
  {address:'0x3DdfA8eC3052539b6C9549F12cEA2C295cfF5296', label:'Justin Sun', tag:'TRON Founder'},
  // Hayden Adams — hayden.eth, Uniswap founder (ENS confirmed)
  {address:'0x50EC05ADe8280758E2077fcBC08D878D4aef79C3', label:'Hayden Adams', tag:'Uniswap Founder'},
  // ── Market Makers (Etherscan labelled) ──────────────────────────────────
  {address:'0x9696f59E4d72E237BE84ffd425DCaD154Bf96976', label:'Wintermute', tag:'Market Maker'},
  {address:'0xf584F8728B874a6a5c7A8d4d387C9aae9172D62', label:'Jump Trading', tag:'Market Maker'},
  // ── Exchanges (Etherscan labelled) ──────────────────────────────────────
  {address:'0x47ac0Fb4F2D84898e4D9E7b4DaB3C24507a6D503', label:'Binance Whale', tag:'Exchange'},
  {address:'0xBE0eB53F46cd790Cd13851d5EFf43D12404d33E8', label:'Binance Cold', tag:'Exchange'},
  {address:'0xA090e606E30bD747d4E6245a1517EbE430F0057e', label:'Kraken', tag:'Exchange'},
  {address:'0x71660c4005BA85c37ccec55d0C4493E66Fe775d3', label:'Coinbase Hot', tag:'Exchange'},
]

// ── STATE ────────────────────────────────────────────────────────────────
let wallets = JSON.parse(localStorage.getItem('wr_wallets') || 'null') || FAMOUS.slice(0,3)
let ethPrice = ETH_PRICE_USD
let tokenCache = {} // address -> [{symbol,name,amount,decimals,usdValue}]
let balanceCache = {} // address -> ethBalance
let seenTxs = new Set()
let txTotal = 0
let totalVolume = 0
let alertsEnabled = false
let syncPaused = false
let isSyncing = false
let countdown = 15
let countdownTimer = null

// ── API ──────────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms))
async function api(params) {
  try {
    const r = await fetch('/api/etherscan?' + new URLSearchParams({...params, _t: Date.now()}))
    return await r.json()
  } catch { return null }
}

// ── ETH PRICE ────────────────────────────────────────────────────────────
async function fetchEthPrice() {
  try {
    const d = await api({module:'stats', action:'ethprice'})
    if (d && d.status === '1') ethPrice = parseFloat(d.result.ethusd)
  } catch {}
}

// ── FORMAT HELPERS ────────────────────────────────────────────────────────
const shortAddr = a => a.slice(0,6)+'…'+a.slice(-4)
const fmtETH = n => {
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M'
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K'
  if (n >= 1) return n.toFixed(2)
  return n.toFixed(4)
}
const fmtUSD = n => {
  if (!n || n === 0) return '—'
  if (n >= 1e9) return '$'+(n/1e9).toFixed(2)+'B'
  if (n >= 1e6) return '$'+(n/1e6).toFixed(2)+'M'
  if (n >= 1e3) return '$'+(n/1e3).toFixed(1)+'K'
  return '$'+n.toFixed(2)
}
const fmtTokenAmt = (value, decimals) => {
  try {
    const d = parseInt(decimals)||18
    const n = Number(BigInt(value)) / Math.pow(10, d)
    if (n >= 1e9) return (n/1e9).toFixed(2)+'B'
    if (n >= 1e6) return (n/1e6).toFixed(2)+'M'
    if (n >= 1e3) return (n/1e3).toFixed(1)+'K'
    if (n >= 1) return n.toFixed(2)
    if (n > 0) return n.toFixed(4)
    return '0'
  } catch { return '?' }
}
const nowTime = () => new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
const timeAgo = ts => {
  const d = Date.now()/1000 - parseInt(ts)
  if (d < 60) return Math.floor(d)+'s ago'
  if (d < 3600) return Math.floor(d/60)+'m ago'
  return Math.floor(d/3600)+'h ago'
}

// ── WALLET MANAGEMENT ────────────────────────────────────────────────────
const saveWallets = () => localStorage.setItem('wr_wallets', JSON.stringify(wallets))

// ── ENS LOOKUP ───────────────────────────────────────────────────────────
async function resolveENS() {
  const input = document.getElementById('inputAddr')
  const status = document.getElementById('ensStatus')
  const val = input.value.trim()

  if (!val.endsWith('.eth')) {
    status.style.display = 'none'
    return
  }

  status.textContent = 'Resolving ' + val + '…'
  status.style.display = 'block'
  status.style.color = 'var(--muted)'

  try {
    // Use Cloudflare's ENS gateway
    const nameHash = val
    const r = await fetch(`https://api.ensideas.com/ens/resolve/${encodeURIComponent(val)}`)
    const d = await r.json()

    if (d.address) {
      input.value = d.address
      document.getElementById('inputName').value = document.getElementById('inputName').value || d.displayName || val
      status.textContent = '✓ Resolved: ' + d.address.slice(0,10) + '…' + d.address.slice(-6)
      status.style.color = 'var(--green)'
    } else {
      // Fallback: use Etherscan ENS lookup
      const r2 = await fetch(`/api/etherscan?module=accounts&action=ens-lookup&name=${encodeURIComponent(val)}&_t=${Date.now()}`)
      status.textContent = '⚠ Could not resolve. Try pasting the 0x address directly.'
      status.style.color = 'var(--red)'
    }
  } catch(e) {
    status.textContent = '⚠ Lookup failed. Paste the 0x address manually.'
    status.style.color = 'var(--red)'
  }
}

function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('open')
}

async function addWallet() {
  const addr = document.getElementById('inputAddr').value.trim()
  const label = document.getElementById('inputName').value.trim()
  // Auto-resolve if ENS entered
  if (addr.endsWith('.eth')) {
    await resolveENS()
    addr = document.getElementById('inputAddr').value.trim()
  }
  if (!addr.startsWith('0x') || addr.length !== 42) { toast('⚠ Invalid address', ''); return }
  if (wallets.find(w => w.address.toLowerCase() === addr.toLowerCase())) { toast('Already tracked', ''); return }
  wallets.push({address: addr, label: label || shortAddr(addr)})
  saveWallets()
  document.getElementById('inputAddr').value = ''
  document.getElementById('inputName').value = ''
  toggleAddForm()
  await renderTraders()
  toast('✓ Added', label || shortAddr(addr))
}

function removeWallet(addr, e) {
  e.stopPropagation()
  wallets = wallets.filter(w => w.address !== addr)
  delete tokenCache[addr]
  delete balanceCache[addr]
  saveWallets()
  renderTraders()
}

function loadFamous() {
  let added = 0
  for (const f of FAMOUS) {
    if (!wallets.find(w => w.address.toLowerCase() === f.address.toLowerCase())) {
      wallets.push(f); added++
    }
  }
  saveWallets()
  renderTraders()
  loadAllBalances()
  toast(`⭐ ${added} traders added`, 'Vitalik, CZ, Armstrong, Kraken, Wintermute…')
}

// ── BALANCES ─────────────────────────────────────────────────────────────
async function loadAllBalances() {
  if (!wallets.length) return
  const addresses = wallets.map(w => w.address).join(',')
  const d = await api({module:'account', action:'balancemulti', address: addresses, tag:'latest'})
  if (!d || d.status !== '1') return
  for (const item of d.result) {
    const eth = Number(BigInt(item.balance)) / 1e18
    balanceCache[item.account.toLowerCase()] = eth
  }
  // Re-render to update balances
  renderTraderList()
}

// ── TOKEN LOADING (per wallet, on accordion open) ─────────────────────────
async function loadWalletTokens(address) {
  if (tokenCache[address]) return tokenCache[address] // cached

  // Get recent token transfers and compute net balance
  const d = await api({module:'account', action:'tokentx', address, sort:'desc', offset:'100', page:'1'})
  if (!d || d.status !== '1') { tokenCache[address] = []; return [] }

  const map = {}
  for (const tx of d.result) {
    const c = tx.contractAddress
    if (!map[c]) map[c] = {name:tx.tokenName, symbol:tx.tokenSymbol, decimals:parseInt(tx.tokenDecimal)||18, net:BigInt(0)}
    const val = BigInt(tx.value || '0')
    if (tx.to.toLowerCase() === address.toLowerCase()) map[c].net += val
    else map[c].net -= val
  }

  const tokens = Object.entries(map)
    .filter(([_,t]) => t.net > BigInt(0))
    .map(([contract, t]) => {
      const amount = Number(t.net) / Math.pow(10, t.decimals)
      // Rough USD estimate for known stablecoins, otherwise skip
      let usdValue = 0
      const sym = t.symbol.toUpperCase()
      if (sym === 'USDC' || sym === 'USDT' || sym === 'DAI' || sym === 'BUSD' || sym === 'FRAX') usdValue = amount
      else if (sym === 'WETH' || sym === 'STETH' || sym === 'WSTETH') usdValue = amount * ethPrice
      else if (sym === 'WBTC') usdValue = amount * 65000
      return {symbol: t.symbol, name: t.name, amount, decimals: t.decimals, net: t.net.toString(), usdValue, contract}
    })
    .sort((a,b) => b.usdValue - a.usdValue || b.amount - a.amount)
    .slice(0, 30)

  tokenCache[address] = tokens
  return tokens
}

// ── RENDER TRADERS ────────────────────────────────────────────────────────
function renderTraderList() {
  const list = document.getElementById('traderList')
  document.getElementById('statWallets').textContent = wallets.length

  if (!wallets.length) {
    list.innerHTML = '<div class="feed-empty">No wallets. Click + Add Wallet or ⭐ Famous</div>'
    return
  }

  // Sort by ETH balance descending
  const sorted = [...wallets].map(w => ({
    ...w,
    eth: balanceCache[w.address.toLowerCase()] || 0
  })).sort((a,b) => b.eth - a.eth)

  list.innerHTML = sorted.map((w, i) => {
    const ethVal = w.eth
    const usdVal = ethVal * ethPrice
    return `
    <div class="trader-row" id="row-${w.address}">
      <div class="trader-header" onclick="toggleAccordion('${w.address}')">
        <div class="trader-rank">#${i+1}</div>
        <div class="trader-info">
          <div class="trader-name">${w.label}</div>
          <div class="trader-addr">${shortAddr(w.address)}${w.tag ? ' · <span style=\"color:var(--muted);font-style:italic\">' + w.tag + '</span>' : ''}</div>
        </div>
        <div class="trader-eth">
          <div class="trader-eth-val">${ethVal > 0 ? fmtETH(ethVal)+' ETH' : '…'}</div>
          <div class="trader-eth-usd">${ethVal > 0 ? fmtUSD(usdVal) : ''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="removeWallet('${w.address}',event)" style="font-size:10px;color:var(--faint);background:none;border:none;cursor:pointer;padding:2px 4px" title="Remove">✕</button>
          <div class="trader-chevron">▼</div>
        </div>
      </div>
      <div class="trader-body" id="body-${w.address}">
        <div class="token-loading" id="tokens-${w.address}">
          <div class="spinner"></div>Loading token holdings…
        </div>
      </div>
    </div>`
  }).join('')
}

async function renderTraders() {
  renderTraderList()
}

async function toggleAccordion(address) {
  const row = document.getElementById(`row-${address}`)
  const body = document.getElementById(`body-${address}`)
  const wasOpen = row.classList.contains('open')

  // Close all others
  document.querySelectorAll('.trader-row.open').forEach(r => r.classList.remove('open'))

  if (!wasOpen) {
    row.classList.add('open')
    // Load tokens if not cached
    const cached = tokenCache[address]
    if (!cached) {
      body.innerHTML = '<div class="token-loading"><div class="spinner"></div>Loading token holdings…</div>'
      const tokens = await loadWalletTokens(address)
      renderTokenTable(address, tokens)
    } else {
      renderTokenTable(address, cached)
    }
  }
}

function renderTokenTable(address, tokens) {
  const body = document.getElementById(`body-${address}`)
  if (!tokens.length) {
    body.innerHTML = '<div class="no-tokens">No significant token holdings found in recent transactions</div>'
    return
  }

  const rows = tokens.map(t => {
    const usdStr = t.usdValue > 0 ? `<span class="tok-usd positive">${fmtUSD(t.usdValue)}</span>` : '<span class="tok-usd">—</span>'
    const initials = (t.symbol || '?').slice(0,3).toUpperCase()
    return `
    <tr>
      <td>
        <span class="tok-icon">${initials}</span>
        <span class="tok-name">${t.name.slice(0,22)}</span>
      </td>
      <td><span class="tok-symbol">${t.symbol}</span></td>
      <td><span class="tok-amount">${fmtTokenAmt(t.net, t.decimals)}</span></td>
      <td>${usdStr}</td>
    </tr>`
  }).join('')

  body.innerHTML = `
  <table class="token-table">
    <thead>
      <tr>
        <th>Token</th>
        <th>Symbol</th>
        <th>Amount</th>
        <th>Value (USD)</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`
}

// ── LIVE FEED ─────────────────────────────────────────────────────────────
function addFeedRow(tx, label, walletAddr) {
  const feed = document.getElementById('liveFeed')
  const empty = feed.querySelector('.feed-empty')
  if (empty) feed.innerHTML = ''

  const isIn = tx.to && tx.to.toLowerCase() === walletAddr.toLowerCase()
  const eth = Number(BigInt(tx.value || '0')) / 1e18
  const token = tx.tokenSymbol || 'ETH'
  const amount = eth > 0 ? fmtETH(eth) + ' ' + token : '—'

  const row = document.createElement('div')
  row.className = 'feed-row'
  row.innerHTML = `
    <div class="feed-top">
      <span class="feed-wallet">${label}</span>
      <span class="feed-amount">${amount}</span>
    </div>
    <div class="feed-bottom">
      <span class="feed-dir ${isIn?'buy':'sell'}">${isIn?'▲ IN':'▼ OUT'}</span>
      <span class="feed-time">${timeAgo(tx.timeStamp)}</span>
    </div>`
  feed.insertBefore(row, feed.firstChild)

  txTotal++
  totalVolume += eth
  document.getElementById('statTx').textContent = txTotal
  document.getElementById('statVol').textContent = fmtETH(totalVolume)
  while (feed.children.length > 60) feed.removeChild(feed.lastChild)

  if (alertsEnabled && eth > 0.5) {
    fireAlert(label, isIn ? 'IN' : 'OUT', amount)
  }
}

async function pollFeed() {
  for (const w of wallets) {
    const d = await api({module:'account', action:'txlist', address:w.address, sort:'desc', offset:'5', page:'1'})
    if (d && d.status === '1') {
      for (const tx of d.result.slice(0,3)) {
        if (!seenTxs.has(tx.hash) && tx.value !== '0') {
          seenTxs.add(tx.hash)
          addFeedRow(tx, w.label, w.address)
        }
      }
    }
    await sleep(300)
  }
}

// ── BLOCK ─────────────────────────────────────────────────────────────────
async function updateBlock() {
  const d = await api({module:'proxy', action:'eth_blockNumber'})
  if (d && d.result) {
    document.getElementById('statBlock').textContent = parseInt(d.result,16).toLocaleString('de-DE')
    document.getElementById('statBlockTime').textContent = nowTime()
  }
}

// ── ALERTS ────────────────────────────────────────────────────────────────
async function toggleAlerts() {
  if (!alertsEnabled) {
    const p = await Notification.requestPermission()
    if (p === 'granted') {
      alertsEnabled = true
      document.getElementById('alertBtn').textContent = '🔔 ON'
      document.getElementById('alertBtn').style.color = 'var(--green)'
      toast('Alerts enabled', 'You\'ll be notified on transactions > 0.5 ETH')
    }
  } else {
    alertsEnabled = false
    document.getElementById('alertBtn').textContent = '🔔 Alerts'
    document.getElementById('alertBtn').style.color = ''
  }
}

function fireAlert(label, dir, amount) {
  new Notification(`${label} — ${dir}`, {body: amount})
  toast(`${label}`, `${dir} ${amount}`)
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(title, body) {
  const wrap = document.getElementById('toastWrap')
  const el = document.createElement('div')
  el.className = 'toast'
  el.innerHTML = `<strong>${title}</strong><span>${body}</span>`
  wrap.appendChild(el)
  setTimeout(() => el.remove(), 4000)
}

// ── SYNC SYSTEM ───────────────────────────────────────────────────────────
function setSyncing(active, label) {
  isSyncing = active
  const dot = document.getElementById('syncDot')
  const lbl = document.getElementById('syncLabel')
  if (dot) dot.className = 'sync-dot' + (active ? '' : ' idle')
  if (lbl) lbl.textContent = label
}

function startCountdown(sec, onDone) {
  clearInterval(countdownTimer)
  countdown = sec
  const fill = document.getElementById('syncFill')
  if (fill) fill.style.width = '100%'
  countdownTimer = setInterval(() => {
    if (syncPaused) return
    countdown--
    const pct = Math.max(0, (countdown / sec) * 100)
    if (fill) fill.style.width = pct + '%'
    const lbl = document.getElementById('syncLabel')
    if (lbl && !isSyncing) lbl.textContent = `Next sync in ${countdown}s`
    if (countdown <= 0) { clearInterval(countdownTimer); onDone() }
  }, 1000)
}

async function runSync() {
  if (isSyncing) return
  setSyncing(true, 'Syncing…')
  await pollFeed()
  setSyncing(false, 'Up to date')
  startCountdown(15, runSync)
}

async function syncNow() {
  if (isSyncing) return
  clearInterval(countdownTimer)
  setSyncing(true, 'Syncing all data…')
  await Promise.all([pollFeed(), updateBlock(), loadAllBalances()])
  renderTraderList()
  setSyncing(false, 'All data refreshed ✓')
  startCountdown(15, runSync)
}

function togglePause() {
  syncPaused = !syncPaused
  const btn = document.getElementById('pauseBtn')
  if (btn) btn.textContent = syncPaused ? '▶' : '⏸'
  const lbl = document.getElementById('syncLabel')
  if (lbl) lbl.textContent = syncPaused ? 'Paused' : `Next sync in ${countdown}s`
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && syncPaused) { syncPaused = false; if (countdown <= 0) syncNow() }
})

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  await fetchEthPrice()
  renderTraderList()
  setSyncing(true, 'Loading…')
  await Promise.all([loadAllBalances(), updateBlock(), pollFeed()])
  renderTraderList()
  setSyncing(false, 'Up to date')
  startCountdown(15, runSync)
  setInterval(loadAllBalances, 60000)
  setInterval(updateBlock, 30000)
}

init()
</script>
